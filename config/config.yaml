# wo-bot-control Configuration
# Author: Antonio Leung
# GitHub: https://github.com/al96169/wo-bot-control
# Package: com.antonioleung.wobot.control

# App Info
app:
  package: "com.antonioleung.wobot.control"
  author: "Antonio Leung"
  github: "https://github.com/al96169/wo-bot-control"
  license: "MIT"

# Robot Info
robot:
  id: "wobot-001"
  name: "My Robot"
  model: "jetson-nano"
  version: "1.0.0"

# Server Settings
server:
  host: "0.0.0.0"
  port: 8765
  http_port: 8000

# mDNS Discovery
mdns:
  enabled: false
  service_type: "_wobot._tcp.local."
  port: 8765

# Status Update
status:
  update_interval: 1.0  # seconds
  subscribe_events:
    - "status"
    - "camera_status"
    - "module_status"

# Motion Control
motion:
  drive_type: "mecanum"  # mecanum, differential, ackermann
  max_linear_speed: 1.0
  max_angular_speed: 1.0
  default_mode: "manual"  # manual, semi, auto
  # 硬件后端: mock / serial / gpio
  hardware_type: "mock"
  # serial 后端配置
  serial_port: "/dev/ttyTHS0"
  serial_baudrate: 115200
  # GPIO 引脚映射 (Jetson BOARD 编号)
  gpio_pins:
    front_left:  {pwm: 32, dir1: 33, dir2: 35}
    front_right: {pwm: 36, dir1: 37, dir2: 38}
    rear_left:   {pwm: 40, dir1: 41, dir2: 43}
    rear_right:  {pwm: 12, dir1: 13, dir2: 15}

# Camera
camera:
  enabled: false
  default_camera: 0
  resolution:
    width: 640
    height: 480
  fps: 30
  stream_type: "mjpeg"  # mjpeg, webrtc

# Gimbal
gimbal:
  enabled: false                # 设为 true 启用云台控制
  gimbal_type: "rosmaster"      # 硬件后端: mock / pca9685 / gpio_pwm / rosmaster
  # Rosmaster 后端配置
  com: "/dev/ttyUSB0"          # Rosmaster 串口设备路径（实际设备 /dev/ttyUSB0）
  car_type: 1                   # 小车类型
  pan_channel: 4                # 左右云台 servo_id (4号位)
  tilt_channel: 3               # 俯仰云台 servo_id (3号位)
  pan_min: 0                    # 角度限制 (Rosmaster 0-180)
  pan_max: 180
  tilt_min: 30                  # -60° 映射到 30
  tilt_max: 150                 # +60° 映射到 150
  pan_invert: false             # 反转水平方向（实际部署时按硬件接线设为 true/false）
  tilt_invert: false            # 反转俯仰方向 (摇杆向上→舵机逆时针)
  step: 3.0                     # 增量模式每步移动角度

# Modules
modules:
  auto_load: true
  module_dir: "src/modules/extension"

# Logging
logging:
  level: "INFO"
  file: "logs/wobot.log"
  max_size: "10MB"
  backup_count: 5

# Security
security:
  auth_enabled: false
  # 当 auth_enabled=true 时，客户端需通过 URL query ?token=xxx 或首条 auth 消息认证
  token: "change-me-to-a-secure-random-string"
