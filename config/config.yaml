# wo-bot-control Configuration
# Author: Antonio Leung
# GitHub: https://github.com/al96169/wo-bot-control
# Package: com.antonioleung.wobot.control

# App Info
app:
  package: "com.antonioleung.wobot.control"
  author: "Antonio Leung"
  github: "https://github.com/al96169/wo-bot-control"
  license: "MIT"

# Robot Info
robot:
  id: "wobot-001"
  name: "My Robot"
  model: "jetson-nano"
  version: "1.0.0"

# Server Settings
server:
  host: "0.0.0.0"
  port: 8765
  http_port: 8000
  # 对外公告的 IP（用于 WebRTC SDP ICE candidate，局域网 mDNS 不可用时）
  # 留空则自动获取：先取 host（非 0.0.0.0 时），否则取本机局域网 IP
  advertised_ip: "192.168.1.47"

# mDNS Discovery
mdns:
  enabled: false
  service_type: "_wobot._tcp.local."
  port: 8765

# Status Update
status:
  update_interval: 1.0  # seconds
  subscribe_events:
    - "status"
    - "camera_status"
    - "module_status"

# Motion Control
motion:
  drive_type: "mecanum"  # mecanum, differential, ackermann
  max_linear_speed: 1.0
  max_angular_speed: 1.0
  default_mode: "manual"  # manual, semi, auto
  # 硬件后端: mock / serial / gpio / rosmaster
  hardware_type: "rosmaster"
  # Rosmaster 串口后端配置（/dev/ttyUSB0 = Rosmaster 主控板，/dev/ttyUSB1 = 备用）
  serial_port: "/dev/ttyUSB0"
  serial_baudrate: 115200
  # GPIO 引脚映射 (Jetson BOARD 编号)
  gpio_pins:
    front_left:  {pwm: 32, dir1: 33, dir2: 35}
    front_right: {pwm: 36, dir1: 37, dir2: 38}
    rear_left:   {pwm: 40, dir1: 41, dir2: 43}
    rear_right:  {pwm: 12, dir1: 13, dir2: 15}

# Camera
camera:
  enabled: true
  default_camera: 0
  resolution:
    width: 640
    height: 480
  fps: 30
  stream_type: "mjpeg"  # mjpeg, webrtc

# Gimbal
gimbal:
  enabled: true                # 设为 true 启用云台控制
  gimbal_type: "rosmaster"      # 硬件后端: mock / pca9685 / gpio_pwm / rosmaster
  # Rosmaster 后端配置
  com: "/dev/ttyUSB0"          # Rosmaster 串口设备路径（实际设备 /dev/ttyUSB0）
  car_type: 1                   # 小车类型
  pan_channel: 4                # 左右云台 servo_id (4号位)
  tilt_channel: 3               # 俯仰云台 servo_id (3号位)
  pan_min: 0                    # 角度限制 (Rosmaster 0-180)
  pan_max: 180
  pan_center: 90               # 回中位置，默认为 (pan_min + pan_max) / 2
  tilt_min: 30                  # -60° 映射到 30
  tilt_max: 150                 # +60° 映射到 150
  # 方向反转
  pan_invert: true              # pan 水平反转（true=左右对调）
  tilt_center: 90               # 回中位置，默认为 (tilt_min + tilt_max) / 2
  tilt_invert: false            # 反转俯仰方向 (摇杆向上→舵机逆时针)
  step: 3.0                     # 增量模式每步移动角度

# Power Policy
power_policy:
  threshold: 30  # 省电阀值（电量百分比），范围 10-50
modules:
  auto_load: true
  module_dir: "src/modules/extension"

# Logging
logging:
  level: "INFO"
  file: "logs/wobot.log"
  max_size: "10MB"
  backup_count: 5

# Security
security:
  auth_enabled: false
  # 当 auth_enabled=true 时，客户端需通过 URL query ?token=xxx 或首条 auth 消息认证
  token: "change-me-to-a-secure-random-string"

# Compatibility
compatibility:
  # 最低支持的客户端协议版本，低于此版本的客户端会被拒绝连接
  min_protocol_version: 1
  # 是否拒绝比服务端更新的客户端（默认 false，新客户端兼容旧服务端）
  reject_newer: false

# Debug
debug:
  # 强制最低协议版本（0 表示使用 compatibility.min_protocol_version）
  # 测试版本拒绝场景时，设置此值 > 客户端当前协议版本即可触发
  force_min_protocol_version: 0

# Binding（客户端绑定认证）
binding:
  enabled: true
  # ROBOT_SECRET：留空则首次启动自动生成并保存到 config/.binding_secret
  secret: ""
  max_clients: 10           # 最多绑定客户端数
  max_failures: 5            # 连续验证失败上限
  cooldown_seconds: 300      # 失败上限后冷却时间（秒）
  session_timeout: 120       # 绑定会话有效期（秒）
  # 密码绑定（兜底方案：设备无外设时使用）
  password_enabled: true    # 是否开启密码绑定方式
  password: "wobot123"      # 初始密码（首次启动后哈希存储到 config/.binding_password，后续通过配置界面修改）
  # 支持的绑定方式开关（关闭后客户端绑定界面将不再显示该方式）
  methods:
    display: true           # 屏幕显示验证码
    tts: true               # 语音播报验证码
    qr_scan: false          # 二维码扫描（待定开发，默认关闭）
    gimbal: true            # 云台动作验证
    password: true          # 密码绑定
    share_code: true        # 分享码绑定

# Software Manager（软件包管理）
software_manager:
  market_endpoint: "http://192.168.1.75:9099"  # wo-bot-market 市场服务器地址（开发电脑）
  manifest_cache_ttl: 300                   # 白名单缓存时长（秒）
  operation_timeout: 120                    # 安装/卸载/升级超时（秒）
